name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, native, and package
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: .NET info
        run: dotnet --info

      - name: Native toolchain info
        run: |
          cmake --version

          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found."
          }

          & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

      - name: Restore
        run: dotnet restore .\Hakamiq.CsoKit.slnx -r win-x64 -p:NuGetAudit=false

      - name: Build Debug
        run: dotnet build .\Hakamiq.CsoKit.slnx -c Debug --no-restore -p:NuGetAudit=false

      - name: Test Debug
        run: dotnet test .\Hakamiq.CsoKit.slnx -c Debug --no-build

      - name: Build native backend
        run: .\scripts\Build-Native.ps1 -Configuration Release -Platform x64

      - name: Publish release package
        run: .\scripts\Publish-Release.ps1 -Runtime win-x64

      - name: Verify release package
        run: .\scripts\Verify-Release.ps1 -Runtime win-x64

      - name: Upload release ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: hakamiq-csokit-win-x64
          path: artifacts/release/*.zip
          if-no-files-found: error