name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.4.0-beta.1"
        required: true
        default: "0.4.0-beta.1"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Resolve release version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tagName = "${{ github.ref_name }}"
            $version = $tagName.TrimStart("v")
          }
          else {
            $version = "${{ github.event.inputs.version }}"
            $tagName = "v$version"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version is empty."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Release version: $version"
          Write-Host "Release tag:     $tagName"

      - name: Publish release package
        run: .\scripts\Publish-Release.ps1 -Version $env:RELEASE_VERSION -Runtime win-x64

      - name: Verify release package
        run: .\scripts\Verify-Release.ps1 -Version $env:RELEASE_VERSION -Runtime win-x64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: hakamiq-csokit-${{ env.RELEASE_VERSION }}-win-x64
          path: |
            artifacts/release/*.zip
            artifacts/publish/win-x64/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zipPath = "artifacts\release\hakamiq-csokit-$env:RELEASE_VERSION-win-x64.zip"
          $shaPath = "artifacts\publish\win-x64\SHA256SUMS.txt"

          if (-not (Test-Path $zipPath)) {
            throw "Release ZIP was not found: $zipPath"
          }

          if (-not (Test-Path $shaPath)) {
            throw "SHA256 manifest was not found: $shaPath"
          }

          gh release create $env:RELEASE_TAG `
            $zipPath `
            $shaPath `
            --title "Hakamiq CsoKit $env:RELEASE_VERSION" `
            --notes "Hakamiq CsoKit $env:RELEASE_VERSION win-x64 release package."
