name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: windows-2025

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: .NET info
        run: dotnet --info

      - name: Native toolchain info
        run: |
          cmake --version

          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            & $vswhere -latest -products * -property installationPath
          }
          else {
            Write-Host "vswhere.exe was not found. Build-Native.ps1 will use fallback discovery."
          }

      - name: Resolve release version
        run: |
          if ("${{ github.ref_type }}" -ne "tag") {
            throw "Official releases must run from a pushed signed tag. Manual dispatch is disabled."
          }

          $tagName = "${{ github.ref_name }}"
          if ($tagName -notmatch "^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$") {
            throw "Release tag must be a semantic version starting with v. Actual tag: $tagName"
          }

          $version = $tagName.Substring(1)
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version is empty."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Release version: $version"
          Write-Host "Release tag:     $tagName"

      - name: Build native backend
        run: .\scripts\Build-Native.ps1 -Configuration Release -Platform x64

      - name: Publish release package
        run: .\scripts\Publish-Release.ps1 -Version $env:RELEASE_VERSION -Runtime win-x64

      - name: Verify release package
        run: .\scripts\Verify-Release.ps1 -Version $env:RELEASE_VERSION -Runtime win-x64

      - name: Attest release ZIP
        uses: actions/attest@v4
        with:
          subject-path: artifacts/release/hakamiq-csokit-${{ env.RELEASE_VERSION }}-win-x64.zip

      - name: Attest SHA256 manifest
        uses: actions/attest@v4
        with:
          subject-path: artifacts/publish/win-x64/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: hakamiq-csokit-${{ env.RELEASE_VERSION }}-win-x64
          path: |
            artifacts/release/*.zip
            artifacts/publish/win-x64/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zipPath = "artifacts\release\hakamiq-csokit-$env:RELEASE_VERSION-win-x64.zip"
          $shaPath = "artifacts\publish\win-x64\SHA256SUMS.txt"

          if (-not (Test-Path $zipPath)) {
            throw "Release ZIP was not found: $zipPath"
          }

          if (-not (Test-Path $shaPath)) {
            throw "SHA256 manifest was not found: $shaPath"
          }

          $releaseArgs = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            $zipPath,
            $shaPath,
            "--title",
            "Hakamiq CsoKit $env:RELEASE_VERSION",
            "--notes-file",
            "RELEASE_NOTES.md"
          )

          gh @releaseArgs
